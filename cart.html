<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - PhonePriceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="index.html">
            <i class="fas fa-mobile-alt me-2"></i>PhonePriceHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">All Mobiles</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
            <a href="cart.html" class="btn btn-outline-light position-relative">
                <i class="fas fa-shopping-cart"></i> Cart
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h2 class="mb-4 fw-bold"><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h2>
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div id="cart-items"></div>
                    <div id="empty-cart" class="text-center py-5" style="display: none;">
                        <i class="fas fa-shopping-cart fa-4x text-muted mb-3"></i>
                        <h4>Your cart is empty</h4>
                        <p>Add some products to your cart!</p>
                        <a href="products.html" class="btn btn-primary">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="fw-bold">Order Summary</h5>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal:</span>
                        <span>Rs. <span id="subtotal">0</span></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Delivery Fee:</span>
                        <span>Rs. <span id="delivery-fee">0</span></span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold mb-3">
                        <span>Total:</span>
                        <span>Rs. <span id="total">0</span></span>
                    </div>
                    <a href="checkout.html" class="btn btn-success w-100" id="checkout-btn">Proceed to Checkout</a>
                    <button class="btn btn-danger w-100 mt-2" id="clear-cart-btn">Clear Cart</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white-50 py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 PhonePriceHub. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
// Display cart items
function displayCart() {
    const cart = getCart();
    const container = document.getElementById('cart-items');
    const emptyCartDiv = document.getElementById('empty-cart');
    
    if (cart.length === 0) {
        container.innerHTML = '';
        emptyCartDiv.style.display = 'block';
        document.getElementById('subtotal').textContent = '0';
        document.getElementById('delivery-fee').textContent = '0';
        document.getElementById('total').textContent = '0';
        return;
    }
    
    emptyCartDiv.style.display = 'none';
    
    container.innerHTML = cart.map((item, index) => `
        <div class="cart-item mb-3 pb-3 border-bottom">
            <div class="row align-items-center">
                <div class="col-md-2">
                    <img src="${item.image}" alt="${item.productName}" style="width: 80px; height: 80px; object-fit: contain;">
                </div>
                <div class="col-md-4">
                    <h6 class="fw-bold">${item.productName}</h6>
                    <small class="text-muted">${item.storage} | ${item.ram} | ${item.color}</small>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control form-control-sm quantity-input" data-index="${index}" value="${item.quantity}" min="1" style="width: 70px;">
                </div>
                <div class="col-md-2">
                    <span class="fw-bold">Rs. ${(item.price * item.quantity).toLocaleString()}</span>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-danger btn-sm remove-item" data-productid="${item.productId}" data-variantindex="${item.variantIndex}">
                        <i class="fas fa-trash"></i> Remove
                    </button>
                </div>
            </div>
        </div>
    `).join('');
    
    // Update totals
    const subtotal = getCartTotal();
    const deliveryFee = subtotal > 50000 ? 0 : 500;
    const total = subtotal + deliveryFee;
    
    document.getElementById('subtotal').textContent = subtotal.toLocaleString();
    document.getElementById('delivery-fee').textContent = deliveryFee.toLocaleString();
    document.getElementById('total').textContent = total.toLocaleString();
    
    // Add event listeners
    document.querySelectorAll('.quantity-input').forEach(input => {
        input.addEventListener('change', (e) => {
            const index = parseInt(e.target.dataset.index);
            const cart = getCart();
            cart[index].quantity = parseInt(e.target.value);
            saveCart(cart);
            displayCart();
            updateCartCount();
        });
    });
    
    document.querySelectorAll('.remove-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const productId = parseInt(btn.dataset.productid);
            const variantIndex = parseInt(btn.dataset.variantindex);
            removeFromCart(productId, variantIndex);
            displayCart();
            updateCartCount();
        });
    });
}

document.getElementById('clear-cart-btn')?.addEventListener('click', () => {
    if (confirm('Are you sure you want to clear your cart?')) {
        localStorage.removeItem('cart');
        displayCart();
        updateCartCount();
    }
});

displayCart();
updateCartCount();
</script>
</body>
</html>
