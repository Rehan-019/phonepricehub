<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Mobiles - PhonePriceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar (same as index.html) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="index.html">
            <i class="fas fa-mobile-alt me-2"></i>PhonePriceHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="products.html">All Mobiles</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
            <form class="d-flex me-3" id="nav-search-form">
                <input class="form-control form-control-sm me-2" type="search" id="nav-search-input" placeholder="Search phones..." style="width: 200px;">
                <button class="btn btn-outline-light btn-sm" type="submit"><i class="fas fa-search"></i></button>
            </form>
            <a href="cart.html" class="btn btn-outline-light position-relative">
                <i class="fas fa-shopping-cart"></i> Cart
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row">
        <!-- Sidebar Filters -->
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-3"><i class="fas fa-filter me-2"></i>Filters</h5>
                    <hr>
                    
                    <!-- Search -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Search</label>
                        <input type="text" id="search-filter" class="form-control" placeholder="Search by name...">
                    </div>
                    
                    <!-- Brand Filter -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Brand</label>
                        <select id="brand-filter" class="form-select">
                            <option value="">All Brands</option>
                            <option value="Samsung">Samsung</option>
                            <option value="Apple">Apple</option>
                            <option value="Google">Google</option>
                            <option value="OnePlus">OnePlus</option>
                            <option value="Xiaomi">Xiaomi</option>
                            <option value="Tecno">Tecno</option>
                            <option value="vivo">vivo</option>
                        </select>
                    </div>
                    
                    <!-- Price Range -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Price Range (PKR)</label>
                        <input type="range" id="price-filter" class="form-range" min="0" max="600000" step="10000" value="600000">
                        <div class="d-flex justify-content-between">
                            <span>Rs. 0</span>
                            <span id="price-value">Rs. 600,000</span>
                        </div>
                    </div>
                    
                    <!-- RAM Filter -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">RAM</label>
                        <select id="ram-filter" class="form-select">
                            <option value="">All</option>
                            <option value="4GB">4GB</option>
                            <option value="6GB">6GB</option>
                            <option value="8GB">8GB</option>
                            <option value="12GB">12GB</option>
                            <option value="16GB">16GB</option>
                        </select>
                    </div>
                    
                    <!-- Storage Filter -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Storage</label>
                        <select id="storage-filter" class="form-select">
                            <option value="">All</option>
                            <option value="64GB">64GB</option>
                            <option value="128GB">128GB</option>
                            <option value="256GB">256GB</option>
                            <option value="512GB">512GB</option>
                            <option value="1TB">1TB</option>
                        </select>
                    </div>
                    
                    <button id="reset-filters" class="btn btn-secondary w-100">Reset Filters</button>
                </div>
            </div>
        </div>
        
        <!-- Products Grid -->
        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">All Mobiles</h4>
                <select id="sort-by" class="form-select w-auto">
                    <option value="default">Sort by: Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name-asc">Name: A to Z</option>
                </select>
            </div>
            <div class="row" id="products-container"></div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white-50 py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 PhonePriceHub. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
</body>
</html>
