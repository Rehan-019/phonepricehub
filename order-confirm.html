<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - PhonePriceHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg">
                <div class="card-body py-5">
                    <i class="fas fa-check-circle text-success fa-5x mb-4"></i>
                    <h2 class="fw-bold mb-3">Order Confirmed!</h2>
                    <p class="lead">Thank you for shopping with PhonePriceHub</p>
                    <div class="alert alert-info">
                        <strong>Order ID:</strong> <span id="order-id"></span><br>
                        <strong>Order Date:</strong> <span id="order-date"></span><br>
                        <strong>Payment Method:</strong> <span id="payment-method"></span>
                    </div>
                    <p>You will receive a confirmation email shortly with your order details.</p>
                    <a href="products.html" class="btn btn-primary">Continue Shopping</a>
                    <a href="index.html" class="btn btn-outline-secondary ms-2">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Display order confirmation
const lastOrder = JSON.parse(localStorage.getItem('lastOrder'));
if (lastOrder) {
    document.getElementById('order-id').textContent = lastOrder.id;
    document.getElementById('order-date').textContent = lastOrder.date;
    document.getElementById('payment-method').textContent = lastOrder.paymentMethod === 'cod' ? 'Cash on Delivery' : 'Credit/Debit Card';
} else {
    window.location.href = 'index.html';
}
</script>
</body>
</html>
